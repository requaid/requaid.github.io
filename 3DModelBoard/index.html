<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' blob: https://api.github.com https://uploads.github.com; img-src 'self' data: blob: https:; media-src 'self' blob:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self';">
  <meta name="referrer" content="no-referrer">
  <title>3D Model Board</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container" id="page-root">
    <div class="list-toolbar">
      <input type="text" class="search" id="search-input" placeholder="제목, 작성자, 태그 검색...">
      <div class="filter-chips" id="filter-chips">
        <button class="filter-chip active" data-format="all">전체</button>
        <button class="filter-chip" data-format="vrm">VRM</button>
        <button class="filter-chip" data-format="pmx">PMX</button>
        <button class="filter-chip" data-format="pmd">PMD</button>
      </div>
      <a href="submit.html" class="btn-primary" style="text-decoration:none;">+ 새 모델 올리기</a>
    </div>

    <section id="card-grid" class="card-grid" aria-live="polite"></section>
    <div id="empty-state" class="empty-state hidden">
      <div class="big">📦</div>
      <div>아직 게시된 모델이 없습니다.</div>
      <div style="margin-top:8px; font-size:12px;">첫 번째 게시물을 올려보세요.</div>
    </div>
  </main>
  <div class="toast-host"></div>
  <script type="module" src="js/list.js"></script>
</body>
</html>
