<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' blob: https://api.github.com https://uploads.github.com; img-src 'self' data: blob: https:; media-src 'self' blob:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self';">
  <meta name="referrer" content="no-referrer">
  <title>3D Model Board — Viewer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="viewer-page">
  <div class="viewer-layout">
    <div class="viewer-wrap">
      <div class="viewer-container" id="viewer-container">
        <div class="viewer-bg" id="viewer-bg"></div>
        <canvas id="viewer-canvas" class="viewer-canvas"></canvas>

        <div class="viewer-topbar">
          <div class="viewer-info">
            <div class="title" id="v-title">로딩중...</div>
            <div class="meta" id="v-meta"></div>
          </div>
          <div class="viewer-top-actions">
            <button id="btn-snapshot" class="icon-btn" title="스냅샷 저장">📷</button>
            <a href="index.html" class="icon-btn" title="목록으로" style="text-decoration:none;">↩</a>
          </div>
        </div>

        <div class="viewer-overlay active" id="overlay">
          <div class="spinner"></div>
          <div id="overlay-text">모델 로딩중...</div>
        </div>

        <div class="dropzone" id="dropzone">
          <div class="dropzone-inner">
            <div class="dropzone-icon">⬇</div>
            <div>모션 파일을 드롭하세요</div>
            <div class="dropzone-ext">.vmd / .bvh</div>
          </div>
        </div>

        <div class="viewer-bottombar">
          <button class="motion-btn" data-motion="idle">🧍 스탠딩</button>
          <button class="motion-btn" data-motion="walk">🚶 걷기</button>
          <button class="motion-btn" data-motion="run">🏃 달리기</button>
          <button class="motion-btn" data-motion="dance">💃 춤추기</button>
          <button class="motion-btn" id="btn-stop">⏹ 정지</button>
          <span class="motion-status" id="motion-status">대기</span>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-host"></div>

  <script type="importmap">
  {
    "imports": {
      "@babylonjs/core": "./vendor/core-entry.js",
      "@babylonjs/loaders": "./vendor/loaders-entry.js",
      "babylon-mmd": "./vendor/mmd-entry.js",
      "fflate": "./vendor/fflate-entry.js"
    }
  }
  </script>
  <script type="module" src="js/view.js"></script>
</body>
</html>
